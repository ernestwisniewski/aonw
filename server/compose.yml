# Helper for starting only local development services from server/.
# Prefer ../compose.yml for the full Docker flow.
services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: aonw_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: aonw
      POSTGRES_USER: aonw
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    ports:
      - "5432:5432"
    volumes:
      - aonw_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aonw -d aonw"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: aonw_redis
    restart: unless-stopped
    command: ["sh", "-c", "redis-server --requirepass \"$${SERVERPOD_PASSWORD_redis}\""]
    environment:
      SERVERPOD_PASSWORD_redis: ${SERVERPOD_PASSWORD_redis:?SERVERPOD_PASSWORD_redis is required}
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${SERVERPOD_PASSWORD_redis}\" ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  aonw_postgres_data:
