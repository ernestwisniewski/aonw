name: aonw
description: "4X strategic hex game"
publish_to: 'none'

version: 1.0.5+66

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flame: '>=1.37.0 <2.0.0'

  share_plus: ^13.1.0
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2
  go_router: ^17.2.1
  image_picker: ^1.2.1
  path_provider: ^2.1.5
  sembast: ^3.7.0
  sembast_web: ^2.4.0
  archive: ^4.0.9
  aonw_core:
    path: packages/aonw_core
  aonw_server_client:
    path: packages/aonw_server_client
  serverpod_auth_core_client: 3.4.10
  serverpod_auth_idp_flutter: 3.4.10
  freezed_annotation: ^3.1.0
  intl: any
  json_annotation: ^4.11.0
  shared_preferences: ^2.5.5
  audioplayers: ^6.6.0
  package_info_plus: ^10.1.0
  flutter_secure_storage: ^10.3.1
  image: ^4.9.1
  file_selector: ^1.1.0
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  build_runner: ^2.13.1
  riverpod_generator: ^4.0.3
  path_provider_platform_interface: ^2.1.2
  plugin_platform_interface: ^2.1.8
  freezed: ^3.2.5
  json_serializable: ^6.13.0

dependency_overrides:
  # Serverpod 3.4.10 still constrains sign_in_with_apple to 7.x.
  # This local patch keeps the 7.x Dart API and adds current SDK Swift cases.
  sign_in_with_apple:
    path: third_party/sign_in_with_apple

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/maps/verdantia/
    - assets/maps/myranth/
    - assets/maps/terenos/
    - assets/icons/
    - assets/sounds/
    - assets/sounds/music/
    - assets/sounds/nature/
    - assets/sprites/
    - assets/sprites/units/
    - assets/main_menu/
    - assets/logo.png

  shaders:
    - shaders/fog_of_war.frag

  fonts:
    - family: Cinzel
      fonts:
        - asset: assets/fonts/Cinzel-VariableFont_wght.ttf
          weight: 400
        - asset: assets/fonts/Cinzel-VariableFont_wght.ttf
          weight: 600
        - asset: assets/fonts/Cinzel-VariableFont_wght.ttf
          weight: 700
        - asset: assets/fonts/Cinzel-VariableFont_wght.ttf
          weight: 900
    - family: Lato
      fonts:
        - asset: assets/fonts/Lato-Light.ttf
          weight: 300
        - asset: assets/fonts/Lato-Regular.ttf
          weight: 400
        - asset: assets/fonts/Lato-Bold.ttf
          weight: 700
