name: aonw

services:
  postgres:
    image: pgvector/pgvector:pg16
    profiles: ["dev", "staging", "prod", "tunnel"]
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-aonw}
      POSTGRES_USER: ${POSTGRES_USER:-aonw}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    ports:
      - "${AONW_POSTGRES_BIND:-127.0.0.1}:${AONW_POSTGRES_PORT:-5432}:5432"
    volumes:
      - aonw_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-aonw} -d ${POSTGRES_DB:-aonw}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    profiles: ["dev", "staging", "prod", "tunnel"]
    restart: unless-stopped
    command: ["sh", "-c", "redis-server --requirepass \"$${SERVERPOD_PASSWORD_redis}\""]
    environment:
      - SERVERPOD_PASSWORD_redis=${SERVERPOD_PASSWORD_redis:?SERVERPOD_PASSWORD_redis is required}
    ports:
      - "${AONW_REDIS_BIND:-127.0.0.1}:${AONW_REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${SERVERPOD_PASSWORD_redis}\" ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  server:
    image: ${AONW_SERVER_IMAGE:-aonw-server:local}
    profiles: ["dev", "staging", "prod", "tunnel"]
    build:
      context: .
      dockerfile: server/Dockerfile
      args:
        AONW_APP_VERSION: ${AONW_APP_VERSION:-}
        AONW_RELEASE_CHANNEL: ${AONW_RELEASE_CHANNEL:-ALPHA}
    restart: unless-stopped
    environment:
      - SERVERPOD_RUN_MODE=${SERVERPOD_RUN_MODE:-staging}
      - SERVERPOD_SERVER_ID=${SERVERPOD_SERVER_ID:-default}
      - SERVERPOD_LOGGING_MODE=${SERVERPOD_LOGGING_MODE:-normal}
      - SERVERPOD_SERVER_ROLE=${SERVERPOD_SERVER_ROLE:-monolith}
      - SERVERPOD_APPLY_MIGRATIONS=${SERVERPOD_APPLY_MIGRATIONS:-true}
      - SERVERPOD_DATABASE_HOST=${SERVERPOD_DATABASE_HOST:-postgres}
      - SERVERPOD_DATABASE_PORT=${SERVERPOD_DATABASE_PORT:-5432}
      - SERVERPOD_DATABASE_NAME=${SERVERPOD_DATABASE_NAME:-aonw}
      - SERVERPOD_DATABASE_USER=${SERVERPOD_DATABASE_USER:-aonw}
      - SERVERPOD_DATABASE_PASSWORD=${SERVERPOD_DATABASE_PASSWORD:?SERVERPOD_DATABASE_PASSWORD is required}
      - SERVERPOD_SERVICE_SECRET=${SERVERPOD_SERVICE_SECRET:?SERVERPOD_SERVICE_SECRET is required}
      - SERVERPOD_REDIS_ENABLED=${SERVERPOD_REDIS_ENABLED:-true}
      - SERVERPOD_REDIS_HOST=${SERVERPOD_REDIS_HOST:-redis}
      - SERVERPOD_REDIS_PORT=${SERVERPOD_REDIS_PORT:-6379}
      - SERVERPOD_PASSWORD_redis=${SERVERPOD_PASSWORD_redis:?SERVERPOD_PASSWORD_redis is required}
      - SERVERPOD_API_SERVER_PORT=${SERVERPOD_API_SERVER_PORT:-8080}
      - SERVERPOD_API_SERVER_PUBLIC_HOST=${SERVERPOD_API_SERVER_PUBLIC_HOST:-api.aonw.net}
      - SERVERPOD_API_SERVER_PUBLIC_PORT=${SERVERPOD_API_SERVER_PUBLIC_PORT:-443}
      - SERVERPOD_API_SERVER_PUBLIC_SCHEME=${SERVERPOD_API_SERVER_PUBLIC_SCHEME:-https}
      - SERVERPOD_INSIGHTS_SERVER_PORT=${SERVERPOD_INSIGHTS_SERVER_PORT:-8081}
      - SERVERPOD_INSIGHTS_SERVER_PUBLIC_HOST=${SERVERPOD_INSIGHTS_SERVER_PUBLIC_HOST:-insights.aonw.net}
      - SERVERPOD_INSIGHTS_SERVER_PUBLIC_PORT=${SERVERPOD_INSIGHTS_SERVER_PUBLIC_PORT:-443}
      - SERVERPOD_INSIGHTS_SERVER_PUBLIC_SCHEME=${SERVERPOD_INSIGHTS_SERVER_PUBLIC_SCHEME:-https}
      - SERVERPOD_WEB_SERVER_PORT=${SERVERPOD_WEB_SERVER_PORT:-8082}
      - SERVERPOD_WEB_SERVER_PUBLIC_HOST=${SERVERPOD_WEB_SERVER_PUBLIC_HOST:-api.aonw.net}
      - SERVERPOD_WEB_SERVER_PUBLIC_PORT=${SERVERPOD_WEB_SERVER_PUBLIC_PORT:-443}
      - SERVERPOD_WEB_SERVER_PUBLIC_SCHEME=${SERVERPOD_WEB_SERVER_PUBLIC_SCHEME:-https}
      - SERVERPOD_WEBSOCKET_PING_INTERVAL=${SERVERPOD_WEBSOCKET_PING_INTERVAL:-20}
      - SERVERPOD_PASSWORD_emailSecretHashPepper=${SERVERPOD_PASSWORD_emailSecretHashPepper:?SERVERPOD_PASSWORD_emailSecretHashPepper is required}
      - SERVERPOD_PASSWORD_jwtHmacSha512PrivateKey=${SERVERPOD_PASSWORD_jwtHmacSha512PrivateKey:?SERVERPOD_PASSWORD_jwtHmacSha512PrivateKey is required}
      - SERVERPOD_PASSWORD_jwtRefreshTokenHashPepper=${SERVERPOD_PASSWORD_jwtRefreshTokenHashPepper:?SERVERPOD_PASSWORD_jwtRefreshTokenHashPepper is required}
      # Optional social sign-in. Leave unset to disable a provider; the server
      # enables Google/Apple only when their secrets are present. The two
      # multi-line secrets are passed base64-encoded and decoded by the entrypoint.
      - AONW_GOOGLE_CLIENT_SECRET_B64=${AONW_GOOGLE_CLIENT_SECRET_B64:-}
      - AONW_APPLE_KEY_B64=${AONW_APPLE_KEY_B64:-}
      - SERVERPOD_PASSWORD_appleServiceIdentifier=${SERVERPOD_PASSWORD_appleServiceIdentifier:-}
      - SERVERPOD_PASSWORD_appleBundleIdentifier=${SERVERPOD_PASSWORD_appleBundleIdentifier:-}
      - SERVERPOD_PASSWORD_appleRedirectUri=${SERVERPOD_PASSWORD_appleRedirectUri:-}
      - SERVERPOD_PASSWORD_appleTeamId=${SERVERPOD_PASSWORD_appleTeamId:-}
      - SERVERPOD_PASSWORD_appleKeyId=${SERVERPOD_PASSWORD_appleKeyId:-}
      - SERVERPOD_PASSWORD_appleAndroidPackageIdentifier=${SERVERPOD_PASSWORD_appleAndroidPackageIdentifier:-}
      - SERVERPOD_PASSWORD_appleWebRedirectUri=${SERVERPOD_PASSWORD_appleWebRedirectUri:-}
    ports:
      - "${AONW_SERVER_BIND:-127.0.0.1}:${AONW_SERVER_PUBLIC_PORT:-8080}:${SERVERPOD_API_SERVER_PORT:-8080}"
      - "${AONW_INSIGHTS_BIND:-127.0.0.1}:${AONW_INSIGHTS_PUBLIC_PORT:-8081}:${SERVERPOD_INSIGHTS_SERVER_PORT:-8081}"
      - "${AONW_WEB_BIND:-127.0.0.1}:${AONW_WEB_PUBLIC_PORT:-8082}:${SERVERPOD_WEB_SERVER_PORT:-8082}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  caddy:
    image: caddy:2-alpine
    profiles: ["staging", "prod"]
    restart: unless-stopped
    environment:
      AONW_API_HOST: ${AONW_API_HOST:-api.aonw.net}
      AONW_INSIGHTS_HOST: ${AONW_INSIGHTS_HOST:-insights.aonw.net}
      AONW_HOMEPAGE_HOST: ${AONW_HOMEPAGE_HOST:-aonw.net}
      AONW_DEMO_HOST: ${AONW_DEMO_HOST:-demo.aonw.net}
      AONW_UPSTREAM: ${AONW_UPSTREAM:-server:8080}
      AONW_WEB_UPSTREAM: ${AONW_WEB_UPSTREAM:-server:8082}
      AONW_INSIGHTS_UPSTREAM: ${AONW_INSIGHTS_UPSTREAM:-server:8081}
    ports:
      - "${AONW_HTTP_PORT:-80}:80"
      - "${AONW_HTTPS_PORT:-443}:443"
    volumes:
      - ./deploy/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
      # The demo web bundle and static root homepage are built locally and
      # rsynced into build/demo/ and build/homepage/ on the server.
      - ./build/demo:/srv/demo:ro
      - ./build/homepage:/srv/homepage:ro
    depends_on:
      - server

  cloudflared:
    image: cloudflare/cloudflared:latest
    profiles: ["tunnel"]
    restart: unless-stopped
    command: tunnel --no-autoupdate --url http://server:${SERVERPOD_API_SERVER_PORT:-8080}
    depends_on:
      - server

volumes:
  aonw_postgres_data:
  caddy_data:
  caddy_config:
