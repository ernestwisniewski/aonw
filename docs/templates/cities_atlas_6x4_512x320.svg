<svg xmlns="http://www.w3.org/2000/svg" width="3072" height="1280" viewBox="0 0 3072 1280">
  <title>Cities atlas template - 6 x 4, 512 x 320 cells</title>
  <defs>
    <pattern id="cell" width="512" height="320" patternUnits="userSpaceOnUse">
      <rect width="512" height="320" fill="#101827" stroke="#38bdf8" stroke-width="4"/>
      <ellipse cx="256" cy="178" rx="212" ry="108" fill="none" stroke="#facc15" stroke-width="3" stroke-dasharray="18 12"/>
      <line x1="256" y1="0" x2="256" y2="320" stroke="#f472b6" stroke-width="3" stroke-dasharray="14 14"/>
      <line x1="0" y1="224" x2="512" y2="224" stroke="#22d3ee" stroke-width="3" stroke-dasharray="14 14"/>
      <circle cx="256" cy="224" r="8" fill="#22d3ee"/>
    </pattern>
  </defs>
  <rect width="3072" height="1280" fill="url(#cell)"/>
  <rect width="3072" height="1280" fill="none" stroke="#ffffff" stroke-width="8"/>
  <g font-family="Inter, Arial, sans-serif" font-size="34" fill="#ffffff">
    <text x="18" y="48">row 0: growth/civic</text>
    <text x="18" y="368">row 1: trade/knowledge/maritime</text>
    <text x="18" y="688">row 2: military/fortified</text>
    <text x="18" y="1008">row 3: industry/modern</text>
  </g>
  <text x="24" y="1250" font-family="Inter, Arial, sans-serif" font-size="30" fill="#fde68a">Columns 0-5 are city visual levels. Keep city footprint on the same baseline.</text>
</svg>
